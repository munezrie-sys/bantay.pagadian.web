<div class="post-job-section">
    <h2>Create a Job Posting</h2>
    <p>Fill out the details below to find a worker.</p>
    
    <form id="jobPostingForm">
        <div class="form-group">
            <label>Job Title</label>
            <input type="text" id="postTitle" placeholder="e.g. Baby Sitter, Gardener" required>
        </div>

        <div class="form-group">
            <label>Salary/Rate (PHP)</label>
            <input type="number" id="postSalary" placeholder="500" required>
        </div>

        <div class="form-group">
            <label>Job Description</label>
            <textarea id="postDesc" rows="4" placeholder="Briefly describe the tasks..."></textarea>
        </div>

        <button type="submit" class="btn-save">Post Job</button>
    </form>
</div>
